---
apiVersion: mssql.sql.crossplane.io/v1alpha1
kind: ProviderConfig
metadata:
  name: default
spec:
  credentials:
    source: MSSQLConnectionSecret
    connectionSecretRef:
      namespace: default
      name: db-conn
  # connectionPool tunes the shared DB connection pool. All fields are optional;
  # omitted fields use the defaults shown below.
  connectionPool:
    maxOpenConnections: 10
    maxIdleConnections: 5
    maxConnLifetime: 1h
    maxConnIdleTime: 10m
