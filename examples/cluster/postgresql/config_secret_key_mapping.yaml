# Example: consume a connection secret that uses non-standard key names.
#
# provider-sql expects keys "endpoint", "port", "username" and "password" by
# default. Secrets written by other providers (e.g. provider-upjet-aws RDS,
# which writes "address", "port", "username", "password") can be consumed by
# remapping the secret keys via spec.credentials.secretKeyMapping.
#
# Only specify the standard keys whose source key name differs from the
# default — omitted entries fall through to the standard key.
---
apiVersion: postgresql.sql.crossplane.io/v1alpha1
kind: ProviderConfig
metadata:
  name: rds
spec:
  sslMode: require
  credentials:
    source: PostgreSQLConnectionSecret
    connectionSecretRef:
      namespace: crossplane-system
      name: rds-connection
    secretKeyMapping:
      # Each field names the standard key; the value is the key to read from
      # the secret. Empty values fall through to the standard key.
      endpoint: address   # provider-upjet-aws writes the host as "address"
      # port:     port    # left as default
      # username: username
      # password: password
---
# Connection secret in the shape produced by provider-upjet-aws RDS. The
# mapping above remaps "address" to the standard "endpoint" key.
apiVersion: v1
kind: Secret
metadata:
  name: rds-connection
  namespace: crossplane-system
type: Opaque
stringData:
  address: my-db.cluster-xyz.us-east-1.rds.amazonaws.com
  port: "5432"
  username: postgres
  password: hunter2
