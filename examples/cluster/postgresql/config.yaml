---
apiVersion: postgresql.sql.crossplane.io/v1alpha1
kind: ProviderConfig
metadata:
  name: default
spec:
  # defaultDatabase is the default database to be used in DSN.
  # Similar to PGDATABASE environment variable and defaults to "postgres"
  # if not set.
  # defaultDatabase: postgres
  # sslMode: disable
  credentials:
    source: PostgreSQLConnectionSecret
    connectionSecretRef:
      namespace: default
      name: db-conn
  # connectionPool tunes the shared DB connection pool. All fields are optional;
  # omitted fields use the defaults shown below.
  connectionPool:
    maxOpenConnections: 10
    maxIdleConnections: 5
    maxConnLifetime: 1h
    maxConnIdleTime: 10m

