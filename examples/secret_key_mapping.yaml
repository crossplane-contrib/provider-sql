# Secret Key Mapping Examples
#
# This feature works identically for all providers (PostgreSQL, MySQL, MSSQL).
# We use namespaced PostgreSQL as the example to avoid redundancy.
#
# provider-sql expects keys "endpoint", "port", "username" and "password" by
# default. There are two approaches when your secret uses different key names:
#
# 1. Composition-based (preferred): write standard key names directly in a
#    Composition — no secretKeyMapping needed.
# 2. Mapping-based (fallback): remap existing non-standard keys via
#    spec.credentials.secretKeyMapping.

##############################################################################
# Approach 1: Build a connection secret inside a Composition
##############################################################################
#
# When you control the secret creation (e.g. inside a Crossplane Composition
# with function-go-templating), you can write the standard key names directly
# and no secretKeyMapping is needed. This is the simplest approach.
#
# For more on wiring connection details in Compositions, see:
# https://docs.crossplane.io/master/guides/connection-details-composition/
#
# The following is a simplified version of a real go-templating composition
# that creates a ProviderConfig for an AWS RDS PostgreSQL cluster. The
# template reads fields from the RDS managed resource's status and writes
# them into a Secret using provider-sql's standard key names.
#
# --- go-templating snippet (provider-config.tpl.yaml) ---
#
# apiVersion: rds.aws.m.upbound.io/v1beta1
# kind: Cluster
# metadata:
#   name: my-rds-cluster
#   annotations:
#     {{ setResourceNameAnnotation "cluster" }}
# ...
# (omitted for brevity)
# ...
#
# ---
# apiVersion: v1
# kind: Secret
# metadata:
#   name: my-rds-cluster-conn
#   annotations:
#     {{ setResourceNameAnnotation "provider-config-secret" }}
#     gotemplating.fn.crossplane.io/ready: "True"
# {{- with dig "status" "atProvider" dict (getComposedResource . "cluster") }}
# data:
#   endpoint: {{ .endpoint | b64enc }}
#   port: {{ .port | toString | b64enc }}
#   ro-endpoint: {{ .readerEndpoint | b64enc }}
#   username: {{ .masterUsername | b64enc }}
# ---
# apiVersion: postgresql.sql.m.crossplane.io/v1alpha1
# kind: ProviderConfig
# metadata:
#   name: my-rds-cluster
#   annotations:
#     {{ setResourceNameAnnotation "provider-config" }}
#     gotemplating.fn.crossplane.io/ready: "True"
# spec:
#   sslMode: require
#   credentials:
#     connectionSecretRef:
#       name: my-rds-cluster-conn
#     source: PostgreSQLConnectionSecret
# {{- end }}
#
# --- end snippet ---
#
# Below is the concrete result after template rendering:
---
apiVersion: v1
kind: Secret
metadata:
  name: my-rds-cluster-conn
  namespace: default
type: Opaque
stringData:
  endpoint: my-db.cluster-xyz.us-east-1.rds.amazonaws.com
  port: "5432"
  username: postgres
  password: XxXxXxXxXxXxXxXx
---
apiVersion: postgresql.sql.m.crossplane.io/v1alpha1
kind: ProviderConfig
metadata:
  name: my-rds-cluster
  namespace: default
spec:
  sslMode: require
  credentials:
    source: PostgreSQLConnectionSecret
    connectionSecretRef:
      name: my-rds-cluster-conn

##############################################################################
# Approach 2: Remap non-standard key names via secretKeyMapping
##############################################################################
#
# Secrets written by other providers (e.g. provider-upjet-aws RDS, which
# writes "address", "port", "username", "password") can be consumed by
# remapping the secret keys via spec.credentials.secretKeyMapping.
#
# Only specify the standard keys whose source key name differs from the
# default — omitted entries fall through to the standard key.
---
apiVersion: postgresql.sql.m.crossplane.io/v1alpha1
kind: ProviderConfig
metadata:
  name: rds
  namespace: default
spec:
  sslMode: require
  credentials:
    source: PostgreSQLConnectionSecret
    connectionSecretRef:
      name: rds-connection
    secretKeyMapping:
      # Each field names the standard key; the value is the key to read from
      # the secret. Empty values fall through to the standard key.
      endpoint: address   # provider-upjet-aws writes the host as "address"
      # port:     port    # left as default
      # username: username
      # password: password
---
# Connection secret in the shape produced by provider-upjet-aws RDS. The
# mapping above remaps "address" to the standard "endpoint" key.
apiVersion: v1
kind: Secret
metadata:
  name: rds-connection
  namespace: default
type: Opaque
stringData:
  address: my-db.cluster-xyz.us-east-1.rds.amazonaws.com
  port: "5432"
  username: postgres
  password: hunter2
