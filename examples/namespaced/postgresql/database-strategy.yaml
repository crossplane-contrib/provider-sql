apiVersion: postgresql.sql.m.crossplane.io/v1alpha1
kind: Database
metadata:
  name: strategy-db
  namespace: default
spec:
  forProvider:
    template: strategy-template
    # Optional, create-only, and supported on PostgreSQL 15+.
    strategy: FILE_COPY
  providerConfigRef:
    kind: ProviderConfig
    name: default
